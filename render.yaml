services:
  - type: web
    name: client-acquisition-system
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: MAILERLITE_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: PARTNER_CHAT_ID
        sync: false
      - key: CLAUDE_API_KEY
        sync: false

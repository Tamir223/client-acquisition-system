<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Client Machinery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/portal/css/portal.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">Client Machinery</div>
            <h1 class="login-title" id="page-title">Reset Password</h1>
            <p class="login-subtitle" id="page-subtitle">Enter your new password below</p>

            <form id="reset-form" novalidate>
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" placeholder="8+ characters" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Repeat password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="reset-btn">Set New Password</button>
                <div class="error-msg" id="error-msg"></div>
                <div class="success-msg" id="success-msg"></div>
            </form>
            <p style="text-align:center;margin-top:16px;font-size:0.875rem;">
                <a href="/portal" style="color:var(--accent);">Back to login</a>
            </p>
        </div>
    </div>

    <script>
    (function () {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const form = document.getElementById('reset-form');
        const btn = document.getElementById('reset-btn');
        const errorEl = document.getElementById('error-msg');
        const successEl = document.getElementById('success-msg');

        if (!token) {
            errorEl.textContent = 'Invalid reset link. Please request a new one.';
            errorEl.classList.add('visible');
            form.style.display = 'none';
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            errorEl.classList.remove('visible');
            successEl.classList.remove('visible');

            const newPw = document.getElementById('new-password').value;
            const confirmPw = document.getElementById('confirm-password').value;

            if (!newPw || newPw.length < 8) {
                errorEl.textContent = 'Password must be at least 8 characters.';
                errorEl.classList.add('visible');
                return;
            }
            if (newPw !== confirmPw) {
                errorEl.textContent = 'Passwords do not match.';
                errorEl.classList.add('visible');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Saving…';

            try {
                const res = await fetch('/api/portal/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPw }),
                });
                const data = await res.json();
                if (!res.ok) {
                    errorEl.textContent = data.error || 'Reset failed. Please try again.';
                    errorEl.classList.add('visible');
                    return;
                }
                successEl.textContent = 'Password updated! Redirecting to login…';
                successEl.classList.add('visible');
                form.style.display = 'none';
                setTimeout(() => { window.location.href = '/portal'; }, 2000);
            } catch (err) {
                errorEl.textContent = 'Network error. Please try again.';
                errorEl.classList.add('visible');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Set New Password';
            }
        });
    }());
    </script>
</body>
</html>

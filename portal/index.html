<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal — Client Machinery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/portal/css/portal.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">Client Machinery</div>
            <h1 class="login-title">Client Portal</h1>
            <p class="login-subtitle">Sign in to manage your leads</p>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" id="sign-in-btn">Sign In</button>
                <div class="error-msg" id="error-msg"></div>
                <p style="text-align:center;margin-top:12px;font-size:0.875rem;">
                    <a href="#" id="forgot-link" style="color:var(--accent);">Forgot password?</a>
                </p>
                <p class="privacy-notice">By logging in you agree to our <a href="/privacy">Privacy Policy</a> and <a href="/terms">Terms of Service</a></p>
            </form>
        </div>
    </div>

    <script>
        (function () {
            if (sessionStorage.getItem('cm_token')) {
                window.location.href = '/portal/dashboard';
            }

            const form = document.getElementById('login-form');
            const btn = document.getElementById('sign-in-btn');
            const errorMsg = document.getElementById('error-msg');

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.add('visible');
            }

            function hideError() {
                errorMsg.classList.remove('visible');
            }

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                hideError();

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                if (!email || !password) {
                    showError('Please enter your email and password.');
                    return;
                }

                btn.disabled = true;
                btn.textContent = 'Signing in…';

                try {
                    const res = await fetch('/api/portal/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password }),
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        showError(data.error || 'Login failed. Please try again.');
                        return;
                    }

                    sessionStorage.setItem('cm_token', data.token);
                    sessionStorage.setItem('cm_client', data.client_name);
                    sessionStorage.setItem('cm_business', data.business_name);
                    window.location.href = '/portal/dashboard';
                } catch (err) {
                    showError('Network error. Please try again.');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            });

            document.getElementById('forgot-link').addEventListener('click', async function (e) {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                if (!email) {
                    showError('Enter your email address first, then click Forgot password.');
                    return;
                }
                try {
                    await fetch('/api/portal/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email }),
                    });
                    hideError();
                    errorMsg.style.color = '#16a34a';
                    errorMsg.textContent = 'If that email exists, a reset link has been sent.';
                    errorMsg.classList.add('visible');
                } catch (err) {
                    showError('Network error. Please try again.');
                }
            });
        }());
    </script>
</body>
</html>
